services:
  recipe-service:
    build: .
    container_name: recipe-service
    ports:
      - "5002:5002"
    environment:
      INVENTORY_SERVICE_URL: http://inventory-service:5001
      GEMINI_API_KEY: your_gemini_api_key_here
    networks:
      - shared-network

networks:
  shared-network:
    external: true
    name: shared-app-network