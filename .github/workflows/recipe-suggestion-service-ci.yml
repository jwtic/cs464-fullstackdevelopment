name: Recipe Suggestion Service CI

on:
  push:
    branches: [ main ]
    paths:
      - 'RecipeSuggestionService/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'RecipeSuggestionService/**'
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./RecipeSuggestionService

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v --asyncio-mode=auto
