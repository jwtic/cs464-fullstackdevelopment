version: "3.9"

services:
  db:
    image: postgres:15
    container_name: user-db-test
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: userdb_test
    ports:
      - "5433:5432"
    volumes:
      - test_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d userdb_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: user-rabbitmq-test
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - ./init-rabbitmq.sh:/tmp/init-rabbitmq.sh
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    command: >
      bash -c "
        chmod +x /tmp/init-rabbitmq.sh &&
        rabbitmq-server &
        sleep 20 &&
        /tmp/init-rabbitmq.sh &&
        wait
      "

  user_service:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: user-service-test
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://user:password@db:5432/userdb_test
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: test-secret-key
      JWT_EXP_MIN: 60
    ports:
      - "5001:5000"
    command: >
      sh -c "
        echo '⏳ Waiting for dependencies...' &&
        sleep 5 &&
        uvicorn app.main:app --host 0.0.0.0 --port 5000
      "

volumes:
  test_pgdata: