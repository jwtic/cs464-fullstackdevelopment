version: "3.9"

services:
  db:
    image: postgres:15
    container_name: imageprocessing-db-test
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: imageprocessingdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d imageprocessingdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  image_processing_service:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: image-processing-service-test
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://admin:password@db:5432/imageprocessingdb
      AZURE_SUBSCRIPTION_KEY: ${AZURE_SUBSCRIPTION_KEY:-placeholder}
      AZURE_ENDPOINT: ${AZURE_ENDPOINT:-https://placeholder.cognitiveservices.azure.com/}
    ports:
      - "5003:5003"
    command: >
      sh -c "sleep 5 && uvicorn main:app --host 0.0.0.0 --port 5003"
